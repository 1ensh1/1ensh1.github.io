<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Computer Systems Quiz</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app" class="container">

        <!-- ── Menu ── -->
        <div id="menu-screen">
            <div class="header">
                <h1>Computer Systems</h1>
                <p>Select a formative assessment to begin</p>
            </div>
            <div id="menu-body"></div>
        </div>

        <!-- ── Quiz ── -->
        <div id="quiz-screen" class="quiz-container hidden">
            <div class="quiz-card">
                <div class="quiz-header">
                    <button class="back-btn" onclick="backToMenu()">← Back to Menu</button>
                    <div class="quiz-info">
                        <span class="formative-label"><span id="current-formative"></span></span>
                        <span class="question-label">Question <span id="current-question"></span> / <span id="total-questions"></span></span>
                    </div>
                    <button class="reset-quiz-btn" onclick="resetCurrentQuiz()">🔄 Reset This Quiz</button>
                </div>

                <div class="question-text" id="question-text"></div>
                <div id="question-image-container" class="question-image-container hidden"></div>
                <div id="options-container" class="options"></div>
                <div id="feedback-container"></div>

                <div class="btn-container">
                    <button id="submit-btn" class="btn btn-primary" onclick="checkAnswer()">Submit Answer</button>
                    <button id="next-btn" class="btn btn-success hidden" onclick="nextQuestion()">Next Question →</button>
                </div>
            </div>
        </div>

        <!-- ── Results ── -->
        <div id="results-screen" class="results-container hidden">
            <div class="results-card">
                <div class="results-icon" id="results-icon">🎉</div>
                <h2 class="results-title">Quiz Complete!</h2>
                <div class="results-score" id="results-score">0 / 20</div>
                <p class="results-message" id="results-message">Great job!</p>
                <div class="results-buttons">
                    <button class="btn btn-primary" onclick="retakeQuiz()">Take Quiz Again</button>
                    <button class="btn btn-secondary" onclick="backToMenu()">Choose Another Quiz</button>
                </div>
            </div>
        </div>

        <!-- ── View All Questions ── -->
        <div id="view-questions-screen" class="view-questions-container hidden">
            <div class="view-questions-card">
                <div class="view-questions-header">
                    <button class="back-btn" onclick="backToMenu()">← Back to Menu</button>
                    <h2><span id="view-formative-number"></span> — All Questions</h2>
                </div>
                <div id="questions-list" class="questions-list"></div>
            </div>
        </div>

    </div>

    <script src="js/script.js"></script>
</body>
</html>
